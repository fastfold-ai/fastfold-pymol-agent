name: Build and Upload PyMOL Plugin Zip

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach asset to (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-plugin-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build plugin zip artifact
        shell: bash
        run: |
          chmod +x scripts/build_plugin_zip.sh
          bash scripts/build_plugin_zip.sh "${{ steps.meta.outputs.version }}"
          cp "dist/fastfold-pymol-agent-${{ steps.meta.outputs.version }}-plugin.zip" "dist/fastfold-pymol-agent-plugin.zip"
          ls -lh dist/

      - name: Upload zip to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSIONED_FILE="dist/fastfold-pymol-agent-${{ steps.meta.outputs.version }}-plugin.zip"
          LATEST_FILE="dist/fastfold-pymol-agent-plugin.zip"
          gh release upload "${{ steps.meta.outputs.tag }}" "${VERSIONED_FILE}" "${LATEST_FILE}" --clobber
