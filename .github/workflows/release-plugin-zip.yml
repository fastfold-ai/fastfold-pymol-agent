name: Build and Upload PyMOL Plugin Zip

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach asset to (e.g. 1.0.0 or v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-plugin-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build plugin zip artifact
        shell: bash
        run: |
          python - "${{ steps.meta.outputs.version }}" <<'PY'
          import pathlib
          import shutil
          import sys
          import tempfile
          import zipfile

          version = sys.argv[1]
          root = pathlib.Path(".")
          dist = root / "dist"
          dist.mkdir(parents=True, exist_ok=True)

          staging = pathlib.Path(tempfile.mkdtemp(prefix="plugin_zip_"))
          pkg_dir = staging / "fastfold_pymol_agent"
          pkg_dir.mkdir(parents=True, exist_ok=True)

          runtime_files = [
              "__init__.py",
              "agent_sdk.py",
              "config.py",
              "gui.py",
              "llm.py",
              "prompts.py",
              "session.py",
              "skills.py",
              "state.py",
              "utils.py",
          ]

          for rel in runtime_files:
              src = root / rel
              if not src.is_file():
                  raise SystemExit(f"Missing runtime file: {src}")
              shutil.copy2(src, pkg_dir / rel)

          assets_src = root / "assets"
          if assets_src.is_dir():
              shutil.copytree(assets_src, pkg_dir / "assets")

          versioned_zip = dist / f"fastfold-pymol-agent-{version}-plugin.zip"
          with zipfile.ZipFile(versioned_zip, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(pkg_dir.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(staging))

          latest_zip = dist / "fastfold-pymol-agent-plugin.zip"
          shutil.copy2(versioned_zip, latest_zip)

          print(versioned_zip)
          print(latest_zip)
          PY
          ls -lh dist/

      - name: Upload zip to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSIONED_FILE="dist/fastfold-pymol-agent-${{ steps.meta.outputs.version }}-plugin.zip"
          LATEST_FILE="dist/fastfold-pymol-agent-plugin.zip"
          gh release upload "${{ steps.meta.outputs.tag }}" "${VERSIONED_FILE}" "${LATEST_FILE}" --clobber
